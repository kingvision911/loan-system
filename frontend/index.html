<!DOCTYPE html>
<html>
<head>
  <title>Loan System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <!-- HEADER -->
    <header class="topbar">
      <h1 class="logo">Loan System</h1>
    </header>

    <!-- LOGIN -->
    <div id="login" class="card auth-card">
      <h2>Login</h2>

      <div class="form-group">
        <input type="email" id="email" placeholder="Email">
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Password">
      </div>

      <div class="btn-group">
        <button onclick="login()" class="btn primary">Login</button>
        <button onclick="showRegister()" class="btn ghost">Create Account</button>
      </div>

      <p id="loginError" class="error-text"></p>
    </div>

    <!-- REGISTER -->
    <div id="register" class="card auth-card" style="display:none;">
      <h2>Create Account</h2>

      <div class="form-grid">
        <input id="userName" placeholder="Name">
        <input id="userEmail" placeholder="Email">
        <input id="userPassword" type="password" placeholder="Password">
        <input id="passwordCheck" type="password" placeholder="Retype Password">
        <input id="userPhone" placeholder="Phone">
        <input id="userNationalId" placeholder="National ID">
      </div>

      <button onclick="createUser()" class="btn primary full">Register</button>

      <button id="setupAdminBtn" onclick="createAdmin()" class="btn warning full" style="display:none;">
        Setup Admin Account
      </button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="dashboard" style="display: none;">
      
      <div class="dashboard-header">
        <h2>Admin Dashboard</h2>
        <div>
          <button onclick="logout()" class="btn danger">Logout</button>
          <button id="createAdminBtn" onclick="createAdmin()" class="btn danger">Create Admin</button>
        </div>
      </div>

      <h3 id="welcomeText" class="welcome-text"></h3>

      <div class="action-bar">
        <button onclick="loadCustomers()" class="btn primary">View Customers</button>
      </div>

      <!-- CREATE LOAN -->
      <div class="card section-card">
        <h3>Create Loan</h3>

        <div class="search-box">
          <input type="text" id="loanSearch" placeholder="Search customer by name or email">
          <ul id="searchResults"></ul>
        </div>

        <div class="form-grid">
          <input type="number" id="loanAmount" placeholder="Amount">
          <input type="number" id="interest" placeholder="Interest %">
          <input type="date" id="startDate">
          <input type="date" id="dueDate">
        </div>

        <button onclick="createLoan()" class="btn success full">Create Loan</button>
      </div>

      <!-- ACTIONS -->
      <div class="action-bar">
        <button onclick="viewCustomerLoans()" class="btn primary">View Customer Records</button>
        <button onclick="printReport()" class="btn secondary">Print Report</button>
      </div>

      <!-- DATA -->
      <div class="data-grid">
        <ul id="customerList" class="data-box"></ul>
        <!-- <div id="customerHistory" class="data-box"></div> -->
      </div>

      <div id="customerLoans" class="data-box full"></div>
    </div>

    <!-- CUSTOMER PANEL -->
    <div id="customerPanel" class="dashboard" style="display: none;">

      <div class="dashboard-header">
        <h2>Customer Dashboard</h2>
        <button onclick="logout()" class="btn danger">Logout</button>
      </div>

      <h3 id="welcomeUser" class="welcome-text"></h3>

      <button onclick="loadMyLoans()" class="btn primary">View My Loans</button>

      <div id="myLoans" class="data-box"></div>
      <ul id="loanList" class="data-box"></ul>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
